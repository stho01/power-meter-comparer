name: Build and Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match expected format X.Y.Z"
            exit 1
          fi

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"; then
            echo "Tag commit is not contained in origin/main"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            built_binary: dist/pmcompare.exe
            asset_name: pmcompare-${GITHUB_REF_NAME}-windows.exe
          - os: ubuntu-latest
            platform: linux
            built_binary: dist/pmcompare
            asset_name: pmcompare-${GITHUB_REF_NAME}-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone executable
        id: build
        shell: bash
        run: |
          pyinstaller --onefile --windowed --name pmcompare pm_compare.py
          release_binary="dist/${{ matrix.asset_name }}"
          mv "${{ matrix.built_binary }}" "${release_binary}"
          echo "release_binary=${release_binary}" >> "${GITHUB_OUTPUT}"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: pmcompare-${{ matrix.platform }}
          path: ${{ steps.build.outputs.release_binary }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PMCompare ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/pmcompare-${{ github.ref_name }}-windows.exe
            release-assets/**/pmcompare-${{ github.ref_name }}-linux
