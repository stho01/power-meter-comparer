name: Build and Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${GITHUB_REF_NAME}' does not match expected format X.Y.Z"
            exit 1
          fi

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main
          if ! git branch -r --contains "${GITHUB_SHA}" | grep -q "origin/main"; then
            echo "Tag commit is not contained in origin/main"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone executable
        shell: bash
        run: |
          pyinstaller --onefile --windowed --name pmcompare pm_compare.py
          mv dist/pmcompare.exe "dist/pmcompare-${GITHUB_REF_NAME}-windows.exe"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PMCompare ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/pmcompare-${{ github.ref_name }}-windows.exe
